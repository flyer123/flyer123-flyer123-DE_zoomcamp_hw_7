# Custom Flink config for PyFlink workshop (enhanced for stateful streaming)

blob:
  server:
    port: '6124'

taskmanager:
  bind-host: 0.0.0.0
  numberOfTaskSlots: 15
  memory:
    process:
      size: 1728m
    jvm-metaspace:
      size: 512m  # required for PyFlink

jobmanager:
  bind-host: 0.0.0.0
  rpc:
    address: jobmanager
    port: 6123
  memory:
    process:
      size: 1600m
  execution:
    failover-strategy: region

query:
  server:
    port: '6125'

parallelism:
  default: 1

rest:
  address: 0.0.0.0

# =========================
# ✅ CRITICAL FIX (STATE)
# =========================

state:
  backend: rocksdb
  checkpoint-storage: filesystem
  checkpoints:
    dir: file:///opt/flink/checkpoints

# Optional but recommended
execution:
  checkpointing:
    interval: 10s
    mode: EXACTLY_ONCE
    min-pause: 5s
    timeout: 1m
    max-concurrent-checkpoints: 1

# Helps prevent unbounded state growth
table:
  exec:
    state:
      ttl: 10 min

# =========================
# JVM OPTIONS (unchanged)
# =========================

env:
  java:
    opts:
      all: >-
        --add-exports=java.rmi/sun.rmi.registry=ALL-UNNAMED
        --add-exports=java.security.jgss/sun.security.krb5=ALL-UNNAMED
        --add-opens=java.base/java.lang=ALL-UNNAMED
        --add-opens=java.base/java.net=ALL-UNNAMED
        --add-opens=java.base/java.io=ALL-UNNAMED
        --add-opens=java.base/java.nio=ALL-UNNAMED
        --add-opens=java.base/sun.nio.ch=ALL-UNNAMED
        --add-opens=java.base/java.lang.reflect=ALL-UNNAMED
        --add-opens=java.base/java.text=ALL-UNNAMED
        --add-opens=java.base/java.time=ALL-UNNAMED
        --add-opens=java.base/java.util=ALL-UNNAMED
        --add-opens=java.base/java.util.concurrent=ALL-UNNAMED
        --add-opens=java.base/java.util.concurrent.atomic=ALL-UNNAMED
        --add-opens=java.base/java.util.concurrent.locks=ALL-UNNAMED